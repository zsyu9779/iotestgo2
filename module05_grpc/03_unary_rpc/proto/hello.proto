syntax = "proto3";

package hello;

option go_package = "iotestgo2/module05_grpc/03_unary_rpc/proto/hellopb";

message HelloRequest {
  string name = 1;
}

message HelloResponse {
  string message = 1;
}

service Greeter {
  // 一元 RPC：客户端发送一个请求，服务端返回一个响应
  rpc SayHello(HelloRequest) returns (HelloResponse);
}
