syntax = "proto3";

package compute;

option go_package = "iotestgo2/module05_grpc/project_distributed_compute/proto/computepb";

// 计算任务
message ComputeTask {
  string task_id = 1;
  repeated int64 numbers = 2;
  string operation = 3;  // sum, avg, max, min, stddev
}

// 计算结果
message ComputeResult {
  string task_id = 1;
  string operation = 2;
  double value = 3;
  string status = 4;  // processing, done, error
  string message = 5;
}

// 分布式计算服务
service DistributedCompute {
  // 客户端流式发送数据 → 服务端实时计算 → 流式返回结果
  rpc Process(stream ComputeTask) returns (stream ComputeResult);
}
