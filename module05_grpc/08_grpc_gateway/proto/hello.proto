syntax = "proto3";

package hello;

option go_package = "iotestgo2/module05_grpc/08_grpc_gateway/proto/hellopb";

import "google/api/annotations.proto";

message HelloRequest {
  string name = 1;
}

message HelloResponse {
  string message = 1;
}

service Greeter {
  // gRPC + HTTP 双暴露
  rpc SayHello(HelloRequest) returns (HelloResponse) {
    option (google.api.http) = {
      post: "/v1/hello"
      body: "*"
    };
  }
}
